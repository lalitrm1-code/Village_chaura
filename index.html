<!DOCTYPE html>
<html>
<head>
  <title>Gram-Chaura Panchyat</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #e6f7ff);
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff3300;
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    th {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      padding: 12px;
      font-size: 20px;
    }

    td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-size: 19px;
       font-weight: bold;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #e0f7fa;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      border-radius: 12px;
      background: #fff;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      z-index: 1000;
      width: 60%;
      max-height: 80%;
      overflow-y: auto;
      animation: fadeIn 0.3s forwards;
    }

    .popup h3 {
      margin-top: 0;
      
      text-align: center;
      font-size: 20px;
    }

    .popup table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .popup th {
      background: #4CAF50;
      color: white;
      padding: 10px;
    }

    .popup td, .popup th {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }

    button {
      display: block;
      margin: 15px auto 0;
      padding: 10px 20px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.3s ease;
    }
    button:hover {
      background: linear-gradient(135deg, #45a049, #388e3c);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      table { width: 95%; }
      .popup { width: 90%; }
    }
    
    /* Main table row colors */
#mainTable tr:nth-child(odd) {
  background-color: #ffffff; /* white */
}

#mainTable tr:nth-child(even) {
  background-color: #f0f8ff; /* very light blue */
}

/* Popup detail table row colors */
.popup table tr:nth-child(odd) {
  background-color: #ffffff;
}

.popup table tr:nth-child(even) {
  background-color: #e3f2fd; /* soft sky blue */
}

/* Header and button colors */
th {
  background: linear-gradient(135deg, #2196F3, #1976D2); /* blue gradient */
  color: white;
}

.popup th {
  background: #2196F3;
  color: white;
}

button {
  background: linear-gradient(135deg, #2196F3, #1976D2);
  color: white;
}

button:hover {
  background: linear-gradient(135deg, #1976D2, #0D47A1);
}
.report-banner {
    text-align: center;
    margin-bottom: 20px;
  }

  .report-banner img {
    width: auto;          /* keep natural width */
    max-width: 100%;      /* never overflow container */
    height: auto;         /* maintain aspect ratio */
    max-height: 200px;    /* default max height for large screens */
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  /* Tablet screens */
  @media (max-width: 768px) {
    .report-banner img {
      max-height: 150px;
    }
  }

  /* Mobile screens */
  @media (max-width: 480px) {
    .report-banner img {
      max-height: 100px;
    }
  }

  </style>
</head>
<body>
<h1>श्री हरज्यु देवाय नमः</h1>
<div class="report-banner">
  <img src="ll.jpg" alt="Report Banner">
</div>
<h1>ग्राम चौड़ा पंचायत आय व्यय विवरण ः 1 मार्च 2023 से 31 मार्च 2026</h1>
<table id="mainTable">
  <tr><th>क्रम संख्या</th><th>दिनांक</th><th>जमा राशि</th></tr>
  <tr data-id="1"><td>1</td><td>मार्च 2023</td><td>3200</td></tr>
  <tr data-id="2"><td>2</td><td>जून 2023</td><td>2500</td></tr>
  <tr data-id="3"><td>3</td><td>7/3/2024</td><td>1150</td></tr>

  <tr data-id="4"><td>4</td><td>28/3/2024</td><td>1500</td></tr>
  <tr data-id="5"><td>5</td><td>1/7/2014</td><td>7840</td></tr>
  <tr data-id="6"><td>6</td><td>18/3/2025</td><td>5985</td></tr>

  <tr data-id="7"><td>7</td><td>3/7/2025</td><td>2550</td></tr>
  <tr data-id="8"><td>8</td><td>24/12/2025</td><td>2350</td></tr>

</table>

<div class="overlay" id="overlay"></div>
<div class="popup" id="popup">
  <h3>पूर्ण विवरण</h3>
  <div id="popupContent"></div>
  <button onclick="closePopup()">बंद करें</button>
</div>

<script>
  // JSON dataset
  const employeeDetails = {
    "1": [
      { Project: "Recruitment Drive", Status: "Completed" },
      { Project: "Policy Update", Status: "In Progress" }
    ],
    "2": [
      { Report: "Annual Budget", "Due Date": "30-Apr-2026" },
      { Report: "Tax Filing", "Due Date": "15-May-2026" }
    ],
    "3": [
      { Detail: "नवंबर 2023-मनोज राम के घर टिन", Amount: "50" },
      { Detail: "दिसंबर 2023-गुसाईं राम के घर लड़की की शादी", Amount: "150" },
      { Detail: "दिसंबर 2023-गुसाईं राम के घर लड़के की शादी", Amount: "150" },
      { Detail: "फरवरी 2024- खुशी की शादी चौस्यारी", Amount: "500" },
      { Detail: "मार्च 2024- साक्षी की शादी सिलखोला", Amount: "300" }
      
     
    ]
  };

  const rows = document.querySelectorAll("#mainTable tr");
  rows.forEach((row, index) => {
    if(index === 0) return; // skip header
    row.addEventListener("click", () => {
      const id = row.getAttribute("data-id");
      const details = employeeDetails[id];

      let html = "<table><tr>";
      Object.keys(details[0]).forEach(key => {
        html += `<th>${key}</th>`;
      });
      html += "</tr>";

      let sum = 0;

      details.forEach(item => {
     
        html += "<tr>";
         let colIndex = 0;
        Object.values(item).forEach(val => {
          html += `<td>${val}</td>`;

          if (colIndex === 1 && !isNaN(val)) {
        sum += parseFloat(val);
      }
      colIndex++;
        });
        html += "</tr>";
      });

       html += `<tr style="font-weight:bold; background:#f0f8ff; color:#0040ff">
             <td colspan="1">कुल योग</td>
             <td>${sum}</td>
           </tr>`;
      html += "</table>";

      document.getElementById("popupContent").innerHTML = html;
      document.getElementById("overlay").style.display = "block";
      document.getElementById("popup").style.display = "block";
    });
  });

  function closePopup() {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("popup").style.display = "none";
  }

  document.getElementById("overlay").addEventListener("click", closePopup);
</script>

</body>
</html>
